<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  body { background: #0a0c14; display: flex; flex-wrap: wrap; gap: 40px; padding: 48px; font-family: sans-serif; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .label { color: #6b7a99; font-size: 13px; }
  .row { display: flex; align-items: center; gap: 20px; }
  /* navbar mock */
  .navbar-mock {
    display: flex; align-items: center; gap: 9px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px 18px;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .navbar-mock span { color: #818cf8; }
</style>
</head>
<body>

<!-- Option A: 渐变书脊 + 竖线代码 -->
<div class="item">
  <div class="label">A · 书脊 + 代码线</div>
  <div class="row">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="64" height="64">
      <defs>
        <linearGradient id="a1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#4f46e5"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
      <rect width="32" height="32" rx="8" fill="url(#a1)"/>
      <rect x="6" y="7" width="3" height="18" rx="1.5" fill="white" opacity="0.95"/>
      <rect x="9" y="8" width="13" height="16" rx="1" fill="white" opacity="0.1"/>
      <rect x="12" y="12" width="7" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
      <rect x="12" y="15.5" width="5" height="1.5" rx="0.75" fill="white" opacity="0.6"/>
      <rect x="12" y="19" width="8" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
      <circle cx="23" cy="23" r="2.5" fill="#c7d2fe" opacity="0.9"/>
    </svg>
    <div class="navbar-mock">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none" width="28" height="28">
        <defs><linearGradient id="a2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>
        <rect width="28" height="28" rx="7" fill="url(#a2)"/>
        <rect x="5" y="6" width="2.5" height="16" rx="1.25" fill="white" opacity="0.95"/>
        <rect x="7.5" y="7" width="11" height="14" rx="1" fill="white" opacity="0.1"/>
        <rect x="10" y="11" width="6" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
        <rect x="10" y="14" width="4.5" height="1.5" rx="0.75" fill="white" opacity="0.65"/>
        <rect x="10" y="17" width="7" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
        <circle cx="20.5" cy="20.5" r="2.5" fill="#c7d2fe" opacity="0.9"/>
      </svg>
      AI <span>源码解析</span>书库
    </div>
  </div>
</div>

<!-- Option B: 代码尖括号 + 书页翻开 -->
<div class="item">
  <div class="label">B · 尖括号书</div>
  <div class="row">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="64" height="64">
      <defs>
        <linearGradient id="b1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0ea5e9"/>
          <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
      </defs>
      <rect width="32" height="32" rx="8" fill="url(#b1)"/>
      <!-- open book pages -->
      <path d="M16 10 L9 13 L9 23 L16 20 Z" fill="white" opacity="0.9"/>
      <path d="M16 10 L23 13 L23 23 L16 20 Z" fill="white" opacity="0.65"/>
      <!-- spine line -->
      <line x1="16" y1="10" x2="16" y2="20" stroke="white" stroke-width="1" opacity="0.5"/>
      <!-- code brackets -->
      <text x="9" y="28" font-size="7" fill="white" opacity="0.7" font-family="monospace">&lt;/&gt;</text>
    </svg>
    <div class="navbar-mock">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none" width="28" height="28">
        <defs><linearGradient id="b2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs>
        <rect width="28" height="28" rx="7" fill="url(#b2)"/>
        <path d="M14 8.5 L7.5 11.5 L7.5 20.5 L14 17.5 Z" fill="white" opacity="0.9"/>
        <path d="M14 8.5 L20.5 11.5 L20.5 20.5 L14 17.5 Z" fill="white" opacity="0.65"/>
        <line x1="14" y1="8.5" x2="14" y2="17.5" stroke="white" stroke-width="1" opacity="0.5"/>
        <text x="8" y="26" font-size="6" fill="white" opacity="0.7" font-family="monospace">&lt;/&gt;</text>
      </svg>
      AI <span>源码解析</span>书库
    </div>
  </div>
</div>

<!-- Option C: 六边形 + 内嵌书 -->
<div class="item">
  <div class="label">C · 六边形科技</div>
  <div class="row">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="64" height="64">
      <defs>
        <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1e293b"/>
          <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
        <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
      <rect width="32" height="32" rx="8" fill="url(#c1)"/>
      <!-- hex outline -->
      <polygon points="16,3 27,9.5 27,22.5 16,29 5,22.5 5,9.5" fill="none" stroke="url(#c2)" stroke-width="1.5" opacity="0.8"/>
      <!-- inner book lines -->
      <rect x="11" y="13" width="10" height="1.5" rx="0.75" fill="url(#c2)" opacity="0.9"/>
      <rect x="11" y="16.5" width="7" height="1.5" rx="0.75" fill="url(#c2)" opacity="0.65"/>
      <!-- dot glow center-top -->
      <circle cx="16" cy="9" r="2" fill="#818cf8" opacity="0.9"/>
    </svg>
    <div class="navbar-mock">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none" width="28" height="28">
        <defs>
          <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
          <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
        </defs>
        <rect width="28" height="28" rx="7" fill="url(#c3)"/>
        <polygon points="14,3 24,8.5 24,19.5 14,25 4,19.5 4,8.5" fill="none" stroke="url(#c4)" stroke-width="1.5" opacity="0.8"/>
        <rect x="9" y="11.5" width="10" height="1.5" rx="0.75" fill="url(#c4)" opacity="0.9"/>
        <rect x="9" y="15" width="7" height="1.5" rx="0.75" fill="url(#c4)" opacity="0.65"/>
        <circle cx="14" cy="8" r="1.8" fill="#818cf8" opacity="0.9"/>
      </svg>
      AI <span>源码解析</span>书库
    </div>
  </div>
</div>

<!-- Option D: 字母 S 源 极简 -->
<div class="item">
  <div class="label">D · 字母极简</div>
  <div class="row">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="64" height="64">
      <defs>
        <linearGradient id="d1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#312e81"/>
          <stop offset="100%" stop-color="#4f46e5"/>
        </linearGradient>
      </defs>
      <rect width="32" height="32" rx="8" fill="url(#d1)"/>
      <!-- S shape with code feel -->
      <text x="5" y="23" font-size="22" font-weight="900" fill="white" font-family="-apple-system,sans-serif" opacity="0.95">S</text>
      <!-- accent underline -->
      <rect x="5" y="25" width="16" height="2" rx="1" fill="#818cf8" opacity="0.8"/>
    </svg>
    <div class="navbar-mock">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none" width="28" height="28">
        <defs><linearGradient id="d2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#312e81"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient></defs>
        <rect width="28" height="28" rx="7" fill="url(#d2)"/>
        <text x="4" y="21" font-size="19" font-weight="900" fill="white" font-family="-apple-system,sans-serif" opacity="0.95">S</text>
        <rect x="4" y="22.5" width="14" height="2" rx="1" fill="#818cf8" opacity="0.8"/>
      </svg>
      AI <span>源码解析</span>书库
    </div>
  </div>
</div>

<!-- Option E: 光晕圆 + 书页线条 现代感 -->
<div class="item">
  <div class="label">E · 光晕现代</div>
  <div class="row">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="64" height="64">
      <defs>
        <radialGradient id="e1" cx="35%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#818cf8"/>
          <stop offset="100%" stop-color="#312e81"/>
        </radialGradient>
      </defs>
      <rect width="32" height="32" rx="8" fill="url(#e1)"/>
      <!-- glow circle -->
      <circle cx="13" cy="12" r="7" fill="white" opacity="0.07"/>
      <!-- stacked pages -->
      <rect x="8" y="10" width="16" height="12" rx="2" fill="white" opacity="0.12"/>
      <rect x="8" y="8.5" width="16" height="12" rx="2" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
      <!-- lines -->
      <rect x="11" y="13" width="10" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
      <rect x="11" y="16.5" width="7" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
      <!-- corner dot -->
      <circle cx="25" cy="7" r="2.5" fill="#c7d2fe" opacity="0.8"/>
    </svg>
    <div class="navbar-mock">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none" width="28" height="28">
        <defs><radialGradient id="e2" cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#312e81"/></radialGradient></defs>
        <rect width="28" height="28" rx="7" fill="url(#e2)"/>
        <circle cx="11" cy="10" r="6" fill="white" opacity="0.07"/>
        <rect x="6" y="9" width="14" height="11" rx="2" fill="white" opacity="0.12"/>
        <rect x="6" y="7.5" width="14" height="11" rx="2" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
        <rect x="9" y="12" width="9" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
        <rect x="9" y="15" width="6" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
        <circle cx="22" cy="6" r="2.2" fill="#c7d2fe" opacity="0.8"/>
      </svg>
      AI <span>源码解析</span>书库
    </div>
  </div>
</div>

</body>
</html>
