<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>
  <!-- book spine -->
  <rect x="6" y="7" width="3" height="18" rx="1.5" fill="white" opacity="0.9"/>
  <!-- book pages -->
  <rect x="9" y="8" width="13" height="16" rx="1" fill="white" opacity="0.15"/>
  <!-- code lines -->
  <rect x="12" y="12" width="7" height="1.5" rx="0.75" fill="white" opacity="0.8"/>
  <rect x="12" y="15.5" width="5" height="1.5" rx="0.75" fill="white" opacity="0.6"/>
  <rect x="12" y="19" width="8" height="1.5" rx="0.75" fill="white" opacity="0.8"/>
  <!-- right accent dot -->
  <circle cx="23" cy="23" r="3" fill="#c7d2fe" opacity="0.9"/>
</svg>
