  <rect x="12" y="13" width="8" height="6" rx="2" fill="#8b5cf6" opacity="0.85"/>
  <rect x="22" y="13" width="8" height="6" rx="2" fill="#8b5cf6"/>
  <!-- connectors -->
  <path d="M10 16h2" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <path d="M20 16h2" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
