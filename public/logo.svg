<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="28" height="28" rx="7" fill="url(#lg)"/>
  <!-- book spine -->
  <rect x="5" y="6" width="2.5" height="16" rx="1.25" fill="white" opacity="0.95"/>
  <!-- book body -->
  <rect x="7.5" y="7" width="11" height="14" rx="1" fill="white" opacity="0.12"/>
  <!-- code lines -->
  <rect x="10" y="11" width="6" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
  <rect x="10" y="14" width="4.5" height="1.5" rx="0.75" fill="white" opacity="0.65"/>
  <rect x="10" y="17" width="7" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
  <!-- sparkle -->
  <circle cx="20.5" cy="20.5" r="2.5" fill="#c7d2fe" opacity="0.9"/>
</svg>
